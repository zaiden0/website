<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAIDEN</title>

<link rel="icon" type="image/x-icon" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:"Silkscreen",sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

main{
    text-align:center;
}

h1{
    font-size:72px;
    font-weight:700;
    letter-spacing:8px;
    margin-bottom:48px;
}

#secretA{
    cursor:pointer;
    user-select:none;
}

#secretImage{
    opacity:0;
    visibility:hidden;
    display:block;
    width:90%;
    max-width:400px;
    margin:40px auto 0;
    transition:opacity .4s ease;
}

#secretImage.show{
    opacity:1;
    visibility:visible;
}

nav{
    display:flex;
    justify-content:center;
    gap:36px;
}

nav a{
    color:#fff;
    font-size:30px;
    text-decoration:none;
    transition:color .15s ease,transform .15s ease;
}

nav a:hover{
    color:#9b9b9b;
    transform:translateY(-2px);
}
</style>
</head>

<body>

<main>

<h1>Z<span id="secretA">A</span>IDEN</h1>

<nav>
<a href="https://bsky.app/profile/zaiden.net" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-bluesky"></i></a>
<a href="https://youtube.com/@zaidenambry-music" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-youtube"></i></a>
<a href="https://zaidenambry.bandcamp.com/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-bandcamp"></i></a>
</nav>

<img id="secretImage" src="secret.png" alt="Secret">

</main>

<script>
const a=document.getElementById("secretA");
const img=document.getElementById("secretImage");
const sound=new Audio("click.mp3");

let count=0;

a.addEventListener("click",()=>{
    count++;
    sound.currentTime=0;
    sound.play();

    if(count>=20){
        img.classList.add("show");
    }
});
</script>

</body>
</html>
